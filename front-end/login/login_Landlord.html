        <div class="div" >
            <main class="container">
                <p style="text-align: center;"><img src="/Images/loginicon.jpg" height="150"><br>
                    <h3>Welcome Landlord!</h3>
                </p>
                <form action="" method="post">
                    <label for="email" class="labels">Email</label>
                    <input type="email" class="texts" id="email" placeholder="1234567@gmail.com" required><br>
                    <label for="Password" class="labels">Password</label>
                    <input type="Password" class="texts"id="Password" minlength="10" maxlength="12" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number or one uppercase or lowercase leeter, and at least 8 or more characters" required ><br>
                    <div class="buttons">
                        <input type="reset" class="button">
                        <input type="submit" class="button">
                    </div>
                    <p>Dont have an account?<a href="landlordsignup.html">Sign Up</a></p>
                </form>
            </main>
        </div>
