                    <input type="Password" class="texts"id="Password" minlength="10" maxlength="12" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number or one uppercase or lowercase leeter and at least 8 or more characters" required >

                    </div>
