        .scroll-img {
            width: 100%;max-width: 600px;      
            height: auto;
            border-radius: 20px;
            margin: 50px auto;
            display: block;
            opacity: 0;
            transform: scale(0.8) translateY(50px);
            transition: all 0.8s ease-out; 
        }
        .scroll-img.appear {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    </style>

    <img src="advert 1.jpg" alt="Advert 1" class="scroll-img">

    <img src="advert3.jpg" alt="Advert 3" class="scroll-img">
</body>
<script>
    const images=document.querySelector('.scroll-img');
    const observer= new IntersectionObserver((entries)=>{
        entries.forEach(entry=>{
            if (entry.isIntersecting){
                entry.target.classList.add('appear');
            }
        });
    },{threshold: 0.2});
