<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find My Vibe | Student Accomodation</title>
    <link rel="icon" type="image/png" href="logo.jpg" style="border-radius: 100%;">
    <link rel="Stylesheet" href="login.css">
</head>
<body>
    <img src="logo.jpg" alt="" id="logo">
    <nav>
        <ul>
            <li><a href="#student">Student</a></li>
            <li><a href="#landlord">Land-Lord</a></li>
        </ul>
    </nav>
    <section id = "#student" class="#login">
        <form action="" method="post">
            <label for="#text1" class ="#fullname">First Name</label>
            <input type="#text1" id="#text1" >
            <label for="#text2" class="#fullname">Last Name</label>
            <input type="text">
            <label for="#email">Email Address</label>
            <input type="#email" placeholder="1234567@uwc.ac.za">
            <label for="#text3"> University</label>
            <label for="accommodation">Select univesity</label>
            <select id="accommodation" name="accommodation">
                <option value="#select">Select univesity</option>
                <option value="#uwc">UWC-University Of the Western Cape </option>
                <option value="#cput">CPUT-Cape Peninsula University of Technology</option>
                <option value="#uct">UCT-University Of Cape Town</option>
                <option value="#su">SU-Stellenborsch University</option>
            </select>
        </form>
    </section>
    <section id="#studentlogin" class="#login">
        <form action="" method="post">
            <label for="#text3" id="">First name</label>
            <input type="text" id="#text3">
            <label for="text" id="#text4">Last Name</label>
            <input type="text" id="#text4">
            <label for="text" id="#email">Email Address</label>
            <input type="text" id="#email" placeholder="landlord@gmail.com">
            <label for="text" id="#phone_number">Telephone/Cell Phone Number</label>
            <input type="#phone_number" >
            <label for="text" id="#password">Password</label>
            <input type="password">
        </form>
    </section>
    <footer>
        <p>&copy;2026 Tech Team. All Rights Reserved</p>
    </footer>
</body>
</html>
